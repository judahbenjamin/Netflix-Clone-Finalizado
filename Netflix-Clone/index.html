<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Netflix - Imersão Alura</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/7a/Logonetflix.png" alt="Netflix Logo">
        </div>
    </header>
    <main>
        <div class="theme-switcher">
            <button id="theme-toggle" aria-label="Mudar tema">🌞</button>
        </div>
        <h1>Quem está assistindo?</h1>
        <section class="profiles-section">
            <div class="profiles-grid">
                <a href="catalogo/catalogo.html" class="profile">
                    <figure>
                        <img src="assets/perfil-1.jpeg" alt="Takumi">
                        <figcaption>Takumi</figcaption>
                    </figure>
                </a>
                <a href="catalogo/catalogo.html" class="profile">
                    <figure>
                        <img src="assets/perfil-2.jpeg" alt="Owen">
                        <figcaption>Owen</figcaption>
                    </figure>
                </a>
                <a href="catalogo/catalogo.html" class="profile">
                    <figure>
                        <img src="assets/perfil-3.jpeg" alt="Yuri">
                        <figcaption>Yuri</figcaption>
                    </figure>
                </a>
                 <a href="catalogo/catalogo.html" class="profile">
                    <figure>
                        <img src="assets/perfil-4.jpeg" alt="Lety">
                        <figcaption>Lety</figcaption>
                    </figure>
                </a>
            </div>
            <a href="#" class="manage-profiles">Gerenciar perfis</a>
        </section>
    </main>
    <script src="theme-toggle.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const profiles = document.querySelectorAll('.profile');
            profiles.forEach(profile => {
                profile.addEventListener('click', (e) => {
                    e.preventDefault();
                    const img = profile.querySelector('img');
                    const name = profile.querySelector('figcaption').textContent;
                    const activeProfile = {
                        name: name,
                        image: img.src
                    };
                    localStorage.setItem('activeProfile', JSON.stringify(activeProfile));
                    window.location.href = profile.href;
                });
            });
        });
    </script>
</body>
</html>
